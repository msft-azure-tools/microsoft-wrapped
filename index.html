<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teams & Outlook Wrapped</title>
    <script>
      (() => {
        const param = new URLSearchParams(window.location.search).get("scoutTheme");
        const theme =
          param || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>
    <style>
:root {
  color-scheme: light;
  --cp-bg: #f3f2f1;
  --cp-bg-elevated: #faf9f8;
  --cp-surface: #ffffff;
  --cp-surface-soft: #edebe9;
  --cp-border: #d2d0ce;
  --cp-border-strong: #8a8886;
  --cp-text: #201f1e;
  --cp-text-muted: #605e5c;
  --cp-text-soft: #605e5c;
  --cp-accent: #0078d4;
  --cp-accent-hover: #106ebe;
  --cp-accent-soft: rgba(0, 120, 212, 0.12);
  --cp-accent-fg: #ffffff;
  --cp-success: #107c10;
  --cp-danger: #d83b01;
  --cp-warning: #ffb900;
  --cp-link: #0078d4;
  --cp-shadow: 0 18px 48px rgba(0, 0, 0, 0.12);
  --cp-overlay: rgba(255, 255, 255, 0.8);
  --cp-panel: rgba(255, 255, 255, 0.86);
  --cp-panel-strong: rgba(255, 255, 255, 0.96);
  --cp-sheen: rgba(255, 255, 255, 0.55);
  --cp-highlight: rgba(0, 120, 212, 0.14);
  --ms-blue: #0078d4;
  --ms-green: #107c10;
  --ms-yellow: #ffb900;
  --ms-red: #d83b01;
}
html[data-theme="dark"] {
  color-scheme: dark;
  --cp-bg: #201f1e;
  --cp-bg-elevated: #252423;
  --cp-surface: #2d2c2b;
  --cp-surface-soft: #323130;
  --cp-border: #484644;
  --cp-border-strong: #8a8886;
  --cp-text: #f3f2f1;
  --cp-text-muted: #c8c6c4;
  --cp-text-soft: #a19f9d;
  --cp-accent: #60cdff;
  --cp-accent-hover: #8bdcff;
  --cp-accent-soft: rgba(96, 205, 255, 0.16);
  --cp-accent-fg: #201f1e;
  --cp-success: #92c353;
  --cp-danger: #f7630c;
  --cp-warning: #ffb900;
  --cp-link: #60cdff;
  --cp-shadow: 0 18px 48px rgba(0, 0, 0, 0.32);
  --cp-overlay: rgba(32, 31, 30, 0.88);
  --cp-panel: rgba(45, 44, 43, 0.72);
  --cp-panel-strong: rgba(45, 44, 43, 0.96);
  --cp-sheen: rgba(255, 255, 255, 0.04);
  --cp-highlight: rgba(96, 205, 255, 0.14);
  --ms-blue: #60cdff;
  --ms-green: #92c353;
  --ms-yellow: #ffb900;
  --ms-red: #f7630c;
}
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
